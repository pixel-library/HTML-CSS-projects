<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Profile Cards</title>

    <link rel="stylesheet" href="card.css">

</head>

<body>

<section id="profile">

    <div class="profile-container">

        <div class="cards-wrapper">

            <!-- LINKEDIN -->

            <article class="card-container">

                <div class="card card1">

                    <div class="card-front">

                        <img src="Images/profile-left-card-bg.jpeg"
                             class="card-bg-image"
                             alt="LinkedIn">

                        <img src="Images/banner.png"
                             class="card-overlay-image"
                             alt="">

                        <h2 class="heading">
                            LinkedIn
                        </h2>

                    </div>

                    <div class="card-back">

                        <div class="profile-card-back">

                            <img src="Images/Awanish.png"
                                 alt="Rudra Sharma">

                        </div>

                        <h3 class="profile-name">
                            Rudra Sharma
                        </h3>

                        <p>
                            Connect with me professionally
                        </p>

                        <a href="https://www.linkedin.com/"
                           target="_blank"
                           class="profile-btn">

                            View

                        </a>

                    </div>

                </div>

            </article>

            <!-- GITHUB -->

            <article class="card-container">

                <div class="card card2">

                    <div class="card-front">

                        <img src="Images/profile-right-card-bg.jpeg"
                             class="card-bg-image"
                             alt="GitHub">

                        <img src="Images/banner.png"
                             class="card-overlay-image"
                             alt="">

                        <div class="card-front-title">
                            <span>ABOUT ME</span>
                        </div>

                    </div>

                    <div class="card-back">

                        <div class="profile-card-back">

                            <img src="Images/Awanish.png"
                                 alt="Rudra Sharma">

                        </div>

                        <h3 class="profile-name">
                            Rudra Sharma
                        </h3>

                        <p>
                            Explore my projects & code
                        </p>

                        <a href="https://github.com/NeuralNexus7"
                           target="_blank"
                           class="profile-btn">

                            View

                        </a>

                    </div>

                </div>

            </article>

        </div>
    </div>

</section>

</body>
</html>
